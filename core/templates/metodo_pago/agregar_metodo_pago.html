{% extends 'core/base.html' %}
{% load static %}

{% block contenido %}
<div class="container" style="padding-top:3rem;padding-bottom:4rem;max-width:700px;">

    <div style="margin-bottom:2rem;">
        <a href="{% url 'list_mp' %}" style="color:var(--text-muted);text-decoration:none;font-size:.88rem;">
            <i class="fa fa-arrow-left me-1"></i> Volver a mis tarjetas
        </a>
    </div>

    <div class="glass-card" style="padding:2.5rem;">
        <div style="text-align:center;margin-bottom:2.5rem;">
            <div style="width:56px;height:56px;background:var(--accent-grad);border-radius:14px;
                display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;">
                <i class="fa fa-credit-card" style="color:#fff;font-size:1.2rem;"></i>
            </div>
            <h2 style="font-weight:800;font-size:1.4rem;margin:0;">Agregar tarjeta</h2>
            <p style="color:var(--text-muted);font-size:.88rem;margin-top:.4rem;">
                Tu información está protegida con cifrado SSL
            </p>
        </div>

        <form action="" method="post">
            {% csrf_token %}

            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label-ba">Número de tarjeta</label>
                    <input type="number" name="numero_tarjeta" class="form-control-ba"
                        placeholder="1234 5678 9012 3456">
                </div>
                <div class="col-md-6">
                    <label class="form-label-ba">Nombre del titular</label>
                    <input type="text" name="nombre" class="form-control-ba" placeholder="Juan">
                </div>
                <div class="col-md-6">
                    <label class="form-label-ba">Apellido del titular</label>
                    <input type="text" name="apellido" class="form-control-ba" placeholder="García">
                </div>
                <div class="col-md-6">
                    <label class="form-label-ba">Fecha de expiración</label>
                    <input type="date" name="fecha_expiracion" class="form-control-ba">
                </div>
                <div class="col-md-6">
                    <label class="form-label-ba">Código de seguridad (CVV)</label>
                    <input type="number" name="codigo_seguridad" class="form-control-ba" placeholder="123">
                </div>
                <div class="col-12">
                    <label class="form-label-ba">RUT titular</label>
                    <input type="text" name="rut" class="form-control-ba" placeholder="12.345.678-9">
                </div>
                <div class="col-12">
                    <label class="form-label-ba">Tipo de pago</label>
                    <select name="tipo_pago" id="tipo_pago" class="form-select-ba">
                        <option value="">— Seleccionar tipo —</option>
                        {% for t in tipo_pago %}
                        <option value="{{ t.0 }}">{{ t.1 }}</option>
                        {% empty %}
                        <option disabled>Sin opciones disponibles (BD desconectada)</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div style="display:flex;gap:.75rem;margin-top:2rem;">
                <button type="submit" class="btn-primary-ba"
                    style="padding:.75rem;flex:1;text-align:center;border:none;cursor:pointer;font-size:.95rem;">
                    <i class="fa fa-floppy-disk me-2"></i> Guardar tarjeta
                </button>
                <a href="{% url 'list_mp' %}" class="btn-ghost"
                    style="padding:.75rem 1.2rem;display:flex;align-items:center;gap:.4rem;">
                    <i class="fa fa-xmark"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block js %}
{% if messages %}
{% for m in messages %}
<script>
    Swal.fire({ title: "{{m}}", icon: "error", background: "#131929", color: "#f0f4ff" })
</script>
{% endfor %}
{% endif %}
{% endblock %}
