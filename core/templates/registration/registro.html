<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Buenos Aires</title>
    {% load static %}
    {% load crispy_forms_tags %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --accent: #4f8ef7;
            --accent-2: #7c3aed;
            --accent-grad: linear-gradient(135deg, #4f8ef7 0%, #7c3aed 100%);
            --text-primary: #f0f4ff;
            --text-muted: #8892a4;
            --glass-border: rgba(255, 255, 255, .10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem 1rem;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(79, 142, 247, .1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, .1) 0%, transparent 50%);
        }

        .auth-card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            background: var(--accent-grad);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            margin: 0 auto 1.5rem;
        }

        /* Override crispy_forms to match dark theme */
        .form-control,
        .form-select {
            background: rgba(255, 255, 255, .06) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 10px !important;
            color: var(--text-primary) !important;
            padding: .75rem 1rem !important;
            font-family: 'Inter', sans-serif;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px rgba(79, 142, 247, .15) !important;
            background: rgba(255, 255, 255, .08) !important;
        }

        .form-control::placeholder {
            color: var(--text-muted) !important;
        }

        .form-label {
            font-size: .8rem !important;
            font-weight: 600 !important;
            color: var(--text-muted) !important;
            letter-spacing: .3px;
        }

        .invalid-feedback,
        .helptext {
            font-size: .78rem !important;
        }

        .is-invalid {
            border-color: rgba(239, 68, 68, .5) !important;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-grad);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            padding: .8rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            opacity: .88;
            transform: translateY(-1px);
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 1.5rem 0;
        }

        ul.errorlist {
            list-style: none;
            padding: 0;
            margin: 0 0 .4rem;
        }

        ul.errorlist li {
            color: #fca5a5;
            font-size: .78rem;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="brand-logo">BA</div>
        <h1 style="text-align:center;font-size:1.5rem;font-weight:800;margin-bottom:.25rem;">Crear cuenta</h1>
        <p style="text-align:center;color:var(--text-muted);font-size:.88rem;margin-bottom:2rem;">
            Únete a Buenos Aires y accede a precios exclusivos
        </p>

        <form method="post">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn-submit">
                <i class="fa fa-user-plus me-2"></i> Registrarme
            </button>
        </form>

        <div class="divider"></div>

        <p style="text-align:center;font-size:.87rem;color:var(--text-muted);">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" style="color:var(--accent);font-weight:600;text-decoration:none;">
                Iniciar sesión
            </a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
