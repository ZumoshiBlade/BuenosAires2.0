<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Buenos Aires</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --accent: #4f8ef7;
            --accent-2: #7c3aed;
            --accent-grad: linear-gradient(135deg, #4f8ef7 0%, #7c3aed 100%);
            --text-primary: #f0f4ff;
            --text-muted: #8892a4;
            --glass-border: rgba(255, 255, 255, .10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(79, 142, 247, .1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(124, 58, 237, .1) 0%, transparent 50%);
        }

        .auth-card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            padding: 2.5rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            background: var(--accent-grad);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1rem;
            color: #fff;
            margin: 0 auto 1.5rem;
        }

        .form-field {
            margin-bottom: 1.1rem;
        }

        .form-field label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: .4rem;
            letter-spacing: .3px;
        }

        .form-field input {
            width: 100%;
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: .75rem 1rem;
            font-size: .9rem;
            font-family: 'Inter', sans-serif;
            transition: border-color .2s, box-shadow .2s;
        }

        .form-field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 142, 247, .15);
            background: rgba(255, 255, 255, .08);
            color: var(--text-primary);
        }

        .form-field input::placeholder {
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            background: var(--accent-grad);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 700;
            padding: .8rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity .2s, transform .15s;
            margin-top: .5rem;
        }

        .btn-submit:hover {
            opacity: .88;
            transform: translateY(-1px);
        }

        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 1.5rem 0;
        }

        .error-list {
            list-style: none;
            padding: 0;
            margin: 0 0 1rem;
        }

        .error-list li {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .2);
            border-radius: 8px;
            color: #fca5a5;
            font-size: .83rem;
            padding: .5rem .9rem;
            margin-bottom: .4rem;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="brand-logo">BA</div>
        <h1 style="text-align:center;font-size:1.5rem;font-weight:800;margin-bottom:.25rem;">Bienvenido</h1>
        <p style="text-align:center;color:var(--text-muted);font-size:.88rem;margin-bottom:2rem;">
            Ingresa a tu cuenta de Buenos Aires
        </p>

        {% if form.errors %}
        <ul class="error-list">
            <li><i class="fa fa-triangle-exclamation me-1"></i> Usuario o contraseña incorrectos</li>
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-field">
                <label for="id_username">Usuario</label>
                <input type="text" id="id_username" name="username" placeholder="Tu nombre de usuario"
                    autocomplete="username">
            </div>
            <div class="form-field">
                <label for="id_password">Contraseña</label>
                <input type="password" id="id_password" name="password" placeholder="••••••••"
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa fa-right-to-bracket me-2"></i> Ingresar
            </button>
        </form>

        <div class="divider"></div>

        <p style="text-align:center;font-size:.87rem;color:var(--text-muted);">
            ¿No tienes cuenta?
            <a href="{% url 'registro' %}" style="color:var(--accent);font-weight:600;text-decoration:none;">
                Regístrate gratis
            </a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
